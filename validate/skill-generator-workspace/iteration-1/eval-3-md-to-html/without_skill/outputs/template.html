<!DOCTYPE html>
<html lang="en" data-theme="{{THEME}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>

  <!-- highlight.js theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css"
        media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css"
        media="(prefers-color-scheme: dark)">

  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">

  <style>
    /* ---- Reset & Base ---- */
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --fg: #24292e;
      --fg-muted: #586069;
      --border: #e1e4e8;
      --bg-code: #f6f8fa;
      --bg-toc: #f9fafb;
      --link: #0366d6;
      --accent: #0366d6;
    }

    html[data-theme="dark"] {
      --bg: #0d1117;
      --fg: #c9d1d9;
      --fg-muted: #8b949e;
      --border: #30363d;
      --bg-code: #161b22;
      --bg-toc: #161b22;
      --link: #58a6ff;
      --accent: #58a6ff;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      color: var(--fg);
      background-color: var(--bg);
      line-height: 1.7;
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ---- Typography ---- */
    h1, h2, h3, h4, h5, h6 {
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
      line-height: 1.3;
    }

    h1 { font-size: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    h3 { font-size: 1.25rem; }
    h4 { font-size: 1.1rem; }

    p { margin: 0 0 1rem; }

    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    img { max-width: 100%; height: auto; border-radius: 4px; }

    blockquote {
      margin: 0 0 1rem;
      padding: 0.5rem 1rem;
      border-left: 4px solid var(--accent);
      color: var(--fg-muted);
      background: var(--bg-code);
    }

    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    /* ---- Code ---- */
    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.875em;
      background: var(--bg-code);
      padding: 0.15em 0.4em;
      border-radius: 4px;
    }

    pre {
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      margin: 0 0 1rem;
      line-height: 1.5;
    }

    pre code {
      background: transparent;
      padding: 0;
      font-size: 0.85rem;
    }

    /* ---- Tables ---- */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 0 0 1rem;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }

    th {
      background: var(--bg-code);
      font-weight: 600;
    }

    /* ---- Lists ---- */
    ul, ol { margin: 0 0 1rem; padding-left: 2rem; }
    li { margin-bottom: 0.25rem; }

    /* ---- Table of Contents ---- */
    .toc {
      background: var(--bg-toc);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
    }

    .toc h2 {
      font-size: 1.1rem;
      margin-top: 0;
      border-bottom: none;
      padding-bottom: 0;
    }

    .toc ul {
      list-style: none;
      padding-left: 0;
      margin-bottom: 0;
    }

    .toc li {
      margin-bottom: 0.3rem;
      line-height: 1.5;
    }

    .toc .toc-level-3 { padding-left: 1.2rem; }
    .toc .toc-level-4 { padding-left: 2.4rem; }

    .toc a {
      color: var(--fg);
      border-bottom: 1px dashed var(--border);
    }

    .toc a:hover {
      color: var(--link);
      text-decoration: none;
      border-bottom-color: var(--link);
    }

    /* ---- KaTeX overrides ---- */
    .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0.5rem 0;
    }

    .katex-error {
      color: #cb2431;
      font-style: italic;
    }

    /* ---- Print ---- */
    @media print {
      body { max-width: 100%; padding: 0; }
      .toc { break-inside: avoid; }
      pre { white-space: pre-wrap; word-wrap: break-word; }
    }
  </style>
</head>
<body>
  {{TOC}}
  <main>
    {{BODY}}
  </main>
</body>
</html>
